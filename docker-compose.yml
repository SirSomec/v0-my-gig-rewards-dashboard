# Фронт (app), админ-панель (admin), бэкенд API (api) и БД PostgreSQL (db) — каждый в отдельном контейнере.
# Данные БД сохраняются в volume pgdata.
# При каждом запуске контейнера api автоматически применяются неприменённые миграции БД (entrypoint).
#
# Конфигурация: один общий файл .env в корне проекта (рядом с docker-compose.yml).
# Контейнер api монтирует его в /app/.env — приложение читает переменные при старте (в т.ч. ETL_*).
# Переменные NEXT_PUBLIC_* для фронта (app) передаются при сборке образа через build args — добавьте NEXT_PUBLIC_MYGIG_API_URL в .env для авторизации через MyGig.
#
# Подключение к БД по умолчанию (можно переопределить через .env):
#   Пользователь: POSTGRES_USER=rewards
#   Пароль:      POSTGRES_PASSWORD=rewards
#   База:        POSTGRES_DB=rewards
#   URL для API: postgres://rewards:rewards@db:5432/rewards

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_REWARDS_API_URL=${NEXT_PUBLIC_REWARDS_API_URL:-http://localhost:3001}
        - NEXT_PUBLIC_DEV_USER_ID=${NEXT_PUBLIC_DEV_USER_ID:-1}
        - NEXT_PUBLIC_ADMIN_SECRET=${NEXT_PUBLIC_ADMIN_SECRET:-${ADMIN_SECRET:-admin-dev-secret}}
        - NEXT_PUBLIC_MYGIG_API_URL=${NEXT_PUBLIC_MYGIG_API_URL:-}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PANEL_PASSWORD=${ADMIN_PANEL_PASSWORD:-}
    restart: unless-stopped

  # Админ-панель (отдельное приложение на порту 3002)
  admin:
    build:
      context: ./admin-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_REWARDS_API_URL=${NEXT_PUBLIC_REWARDS_API_URL:-http://localhost:3001}
        - NEXT_PUBLIC_ADMIN_SECRET=${NEXT_PUBLIC_ADMIN_SECRET:-${ADMIN_SECRET:-admin-dev-secret}}
        - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL:-http://localhost:3000}
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - ADMIN_PANEL_PASSWORD=${ADMIN_PANEL_PASSWORD:-}
    restart: unless-stopped

  api:
    build:
      context: ./nestjs-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgres://rewards:rewards@db:5432/rewards}
      - MIGRATIONS_PATH=/app/migrations
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - JWT_EXPIRE=7d
      # Разрешает dev-login в production (без этого будет 403 "Dev login is disabled in production")
      - DEV_USER_ID=${NEXT_PUBLIC_DEV_USER_ID:-1}
      # Ключ для админ-API (X-Admin-Key). Задайте в .env для production.
      - ADMIN_SECRET=${ADMIN_SECRET:-admin-dev-secret}
      # ETL (MVP): подключение к источнику данных для раздела «Данные ETL» в админке
      - ETL_HOST=${ETL_HOST:-}
      - ETL_PORT=${ETL_PORT:-5432}
      - ETL_USER=${ETL_USER:-}
      - ETL_PASSWORD=${ETL_PASSWORD:-}
      - ETL_DATABASE=${ETL_DATABASE:-}
      - ETL_SSL_ROOT_CERT=${ETL_SSL_ROOT_CERT:-}
      # Мок TOJ: URL и ключ для эндпоинта генерации из админки
      - MOCK_TOJ_URL=${MOCK_TOJ_URL:-http://mock-toj:3010}
      - MOCK_TOJ_ADMIN_KEY=${MOCK_TOJ_ADMIN_KEY:-mock-admin-key}
      # TOJ: источник смен для синхронизации (в dev — мок)
      - TOJ_BASE_URL=${TOJ_BASE_URL:-http://mock-toj:3010}
      - TOJ_USER=${TOJ_USER:-mock}
      - TOJ_PASSWORD=${TOJ_PASSWORD:-mock}
      - TOJ_SYNC_ENABLED=${TOJ_SYNC_ENABLED:-true}
      - TOJ_SYNC_MAX_JOBS_PER_RUN=${TOJ_SYNC_MAX_JOBS_PER_RUN:-1000}
      - TOJ_SYNC_INITIAL_DAYS_AGO=${TOJ_SYNC_INITIAL_DAYS_AGO:-7}
    volumes:
      # Монтируем .env в контейнер — NestJS читает его при старте (ConfigModule envFilePath).
      # На хосте выполните: chmod 644 .env — иначе apiuser в контейнере не прочитает файл и контейнер будет перезапускаться.
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Мок TOJ (смены) для разработки. В prod не использовать.
  mock-toj:
    build:
      context: ./mock-toj-service
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - MOCK_TOJ_USER=${MOCK_TOJ_USER:-mock}
      - MOCK_TOJ_PASSWORD=${MOCK_TOJ_PASSWORD:-mock}
      - MOCK_TOJ_ADMIN_KEY=${MOCK_TOJ_ADMIN_KEY:-mock-admin-key}
    restart: unless-stopped

  # БД PostgreSQL в отдельном контейнере; порт 5432 не проброшен наружу (доступ только из api).
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rewards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rewards}
      POSTGRES_DB: ${POSTGRES_DB:-rewards}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewards"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
