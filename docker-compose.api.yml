# Вариант с фронтом + API + БД. При старте контейнер API автоматически применяет миграции.
# Использование:
#   docker compose -f docker-compose.yml -f docker-compose.api.yml build
#   docker compose -f docker-compose.yml -f docker-compose.api.yml up -d
# Или добавьте в scripts/deploy.sh строку с -f docker-compose.api.yml при необходимости.

services:
  api:
    build:
      context: ./nestjs-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://rewards:rewards@db:5432/rewards
      - MIGRATIONS_PATH=/app/migrations
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - JWT_EXPIRE=7d
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rewards
      POSTGRES_PASSWORD: rewards
      POSTGRES_DB: rewards
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewards"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
